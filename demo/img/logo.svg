<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="glow" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7C3AED" flood-opacity="0.5"/>
    </filter>
    <filter id="inner-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="atop"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.3"/>
  <!-- Shield / Purify symbol -->
  <path d="M256 100 L368 170 L368 290 C368 350 320 400 256 420 C192 400 144 350 144 290 L144 170 Z"
        fill="none" stroke="white" stroke-width="12" stroke-linejoin="round" opacity="0.9"/>
  <!-- Inner shield fill -->
  <path d="M256 120 L352 180 L352 285 C352 338 310 382 256 400 C202 382 160 338 160 285 L160 180 Z"
        fill="white" opacity="0.08"/>
  <!-- Sparkle / purify rays -->
  <g stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.95">
    <!-- Checkmark inside shield -->
    <polyline points="210,270 245,305 310,230" fill="none" stroke-width="16" stroke-linejoin="round"/>
  </g>
  <!-- Top sparkle dots -->
  <circle cx="256" cy="148" r="6" fill="white" opacity="0.7"/>
  <circle cx="310" cy="165" r="4" fill="white" opacity="0.5"/>
  <circle cx="202" cy="165" r="4" fill="white" opacity="0.5"/>
</svg>
