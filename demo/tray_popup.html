<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>PurifyTrayPopup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0f0b1e;
    --surface: #1c1733;
    --raised:  #252040;
    --hover:   #2f2850;
    --border:  rgba(168,85,247,0.15);
    --text:    #ede8f5;
    --text2:   #a99bc2;
    --accent:  #a855f7;
    --acc-h:   #c084fc;
    --acc-dim: rgba(168,85,247,0.12);
    --success: #22c55e;
    --danger:  #ef4444;
    --warn:    #f59e0b;
  }

  html, body {
    width: 100%; height: 100%;
    background: #0f0b1e;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    font-size: 12px;
    color: var(--text);
    user-select: none;
    overflow: hidden;
  }

  .popup {
    width: 240px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .head {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 13px 14px 12px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    width: 24px; height: 24px;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    padding: 3px;
    flex-shrink: 0;
  }
  .logo svg { width: 100%; height: 100%; }
  .app-name {
    font-size: 13px; font-weight: 700;
    letter-spacing: -0.3px;
    flex: 1;
    color: var(--text);
  }
  .head-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text2);
    transition: all 0.4s;
  }
  .head-dot.on {
    background: var(--success);
    box-shadow: 0 0 6px rgba(34,197,94,0.5);
  }

  /* ── Stats row ── */
  .stats {
    display: flex;
    gap: 1px;
    background: var(--border);
  }
  .stat {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 4px 9px;
    background: var(--bg);
  }
  .stat-val {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1;
  }
  .stat-lbl {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text2);
  }
  .stat-bar {
    width: 28px; height: 3px;
    border-radius: 2px;
    background: var(--raised);
    overflow: hidden;
    margin-top: 1px;
  }
  .stat-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    transition: width 0.6s ease;
  }
  .stat-bar-fill.warn { background: var(--warn); }
  .stat-bar-fill.danger { background: var(--danger); }

  /* ── Optimize button ── */
  .opt-wrap {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .opt-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 0;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.2px;
  }
  .opt-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .opt-btn:hover::before { opacity: 1; }
  .opt-btn:active { transform: scale(0.97); }
  .opt-btn.running {
    background: var(--raised);
    color: var(--text2);
    pointer-events: none;
  }
  .opt-btn.done {
    background: linear-gradient(135deg, #059669, #10b981);
  }
  .opt-result {
    text-align: center;
    font-size: 10px;
    color: var(--text2);
    padding-top: 6px;
    line-height: 1.4;
    min-height: 0;
    overflow: hidden;
    transition: all 0.3s;
  }
  .opt-result:empty { padding: 0; }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.25);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* ── Menu ── */
  .menu { padding: 4px 5px; }
  .menu + .menu { border-top: 1px solid var(--border); }

  .mi {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 9px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text);
    transition: all 0.12s;
    font-size: 12px;
    font-weight: 500;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .mi::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(168,85,247,0.08), transparent);
    opacity: 0;
    transition: opacity 0.15s;
  }
  .mi:hover::before { opacity: 1; }
  .mi:hover { background: var(--hover); }
  .mi:active { transform: scale(0.98); }

  .mi-icon {
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.55;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .mi:hover .mi-icon { opacity: 0.85; }
  .mi-text { flex: 1; }
  .mi-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--acc-dim);
    color: var(--accent);
  }

  .mi.bot-on .mi-icon { opacity: 1; color: var(--danger); }
  .mi.bot-off .mi-icon { opacity: 1; color: var(--success); }

  .mi.danger { color: rgba(239,68,68,0.85); }
  .mi.danger .mi-icon { opacity: 0.8; color: var(--danger); }
  .mi.danger:hover { background: rgba(239,68,68,0.06); }
  .mi.danger::before { display: none; }

  /* ── Footer ── */
  .foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px 9px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .foot-ver {
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 0.2px;
  }
  .foot-bat {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text2);
  }
  .foot-bat svg { opacity: 0.5; }
  .foot-bat.charging { color: var(--success); }
  .foot-bat.charging svg { opacity: 0.8; }
  .foot-bat.low { color: var(--warn); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="popup">
  <div class="head">
    <div class="logo"><svg viewBox="0 0 40 40" fill="none"><path d="M5 8Q20 20 5 32" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/><path d="M12.5 5Q20 20 12.5 35" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><path d="M20 3.5Q20 20 20 36.5" stroke="#fff" stroke-width="3.2" stroke-linecap="round"/><path d="M27.5 5Q20 20 27.5 35" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><path d="M35 8Q20 20 35 32" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    <span class="app-name">Purify</span>
    <div class="head-dot" id="hd-dot" title="Бот остановлен"></div>
  </div>

  <!-- System stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="s-cpu">—</div>
      <div class="stat-lbl">CPU</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="sb-cpu" style="width:0"></div></div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-ram">—</div>
      <div class="stat-lbl">RAM</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="sb-ram" style="width:0"></div></div>
    </div>
    <div class="stat">
      <div class="stat-val" id="s-disk">—</div>
      <div class="stat-lbl">Диск</div>
      <div class="stat-bar"><div class="stat-bar-fill" id="sb-disk" style="width:0"></div></div>
    </div>
  </div>

  <!-- Optimize -->
  <div class="opt-wrap">
    <button class="opt-btn" id="opt-btn" onclick="doOptimize()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      Оптимизировать
    </button>
    <div class="opt-result" id="opt-result"></div>
  </div>

  <!-- Menu -->
  <div class="menu">
    <button class="mi" onclick="doShow()">
      <span class="mi-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </span>
      <span class="mi-text">Открыть Purify</span>
    </button>

    <button class="mi" onclick="doChat()">
      <span class="mi-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </span>
      <span class="mi-text">Чат с ИИ</span>
    </button>

    <button class="mi" id="bot-btn" onclick="doToggleBot()">
      <span class="mi-icon" id="bot-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </span>
      <span class="mi-text" id="bot-label">Запустить бот</span>
      <span class="mi-badge" id="bot-badge">OFF</span>
    </button>
  </div>

  <div class="menu">
    <button class="mi" onclick="doNav('settings')">
      <span class="mi-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </span>
      <span class="mi-text">Настройки</span>
    </button>
  </div>

  <div class="menu">
    <button class="mi danger" onclick="doQuit()">
      <span class="mi-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </span>
      <span class="mi-text">Выход</span>
    </button>
  </div>

  <!-- Footer -->
  <div class="foot">
    <span class="foot-ver">v1.0</span>
    <span class="foot-bat hidden" id="bat-info">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="6" width="18" height="12" rx="2"/><line x1="23" y1="10" x2="23" y2="14"/></svg>
      <span id="bat-pct">—</span>
    </span>
  </div>
</div>

<script>
  let _botRunning = false;

  async function init() {
    try {
      const [botR, statsR, batR] = await Promise.all([
        pywebview.api.isBotRunning().catch(() => null),
        pywebview.api.getStats().catch(() => null),
        pywebview.api.getBatteryInfo().catch(() => null),
      ]);
      if (botR) applyBot(botR.running);
      if (statsR) applyStats(statsR);
      if (batR) applyBattery(batR);
    } catch(e) {}
  }

  function applyStats(s) {
    const cpu = s.cpu || 0;
    const ram = s.ram_total > 0 ? Math.round(s.ram_used / s.ram_total * 100) : 0;
    const disk = s.disk_total > 0 ? Math.round(s.disk_used / s.disk_total * 100) : 0;
    el('s-cpu').textContent = cpu + '%';
    el('s-ram').textContent = ram + '%';
    el('s-disk').textContent = disk + '%';
    setBar('sb-cpu', cpu);
    setBar('sb-ram', ram);
    setBar('sb-disk', disk);
  }

  function setBar(id, val) {
    const b = el(id);
    b.style.width = val + '%';
    b.className = 'stat-bar-fill' + (val > 90 ? ' danger' : val > 70 ? ' warn' : '');
  }

  function applyBattery(b) {
    if (!b || !b.present) return;
    const wrap = el('bat-info');
    wrap.classList.remove('hidden');
    el('bat-pct').textContent = b.percent + '%';
    wrap.className = 'foot-bat' + (b.plugged ? ' charging' : b.percent <= 20 ? ' low' : '');
  }

  function applyBot(running) {
    _botRunning = running;
    el('hd-dot').className = 'head-dot' + (running ? ' on' : '');
    el('hd-dot').title = running ? 'Бот работает' : 'Бот остановлен';
    el('bot-label').textContent = running ? 'Остановить бот' : 'Запустить бот';
    el('bot-btn').className = 'mi ' + (running ? 'bot-on' : 'bot-off');
    const badge = el('bot-badge');
    badge.textContent = running ? 'ON' : 'OFF';
    badge.style.background = running ? 'rgba(34,197,94,0.12)' : '';
    badge.style.color = running ? '#22c55e' : '';
    el('bot-icon').innerHTML = running
      ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>'
      : '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>';
  }

  async function doToggleBot() {
    const was = _botRunning;
    applyBot(!was);
    try {
      if (was) await pywebview.api.stopBot();
      else await pywebview.api.startBot();
    } catch(e) { applyBot(was); }
    closePopup();
  }

  async function doOptimize() {
    const btn = el('opt-btn');
    const res = el('opt-result');
    btn.classList.add('running');
    btn.innerHTML = '<div class="spinner"></div> Оптимизация...';
    res.textContent = '';
    try {
      const r = await pywebview.api.quickOptimize();
      btn.classList.remove('running');
      btn.classList.add('done');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Готово';
      const parts = [];
      if (r.freed_mb > 0) parts.push('Очищено ' + r.freed_mb + ' МБ');
      if (r.deleted > 0) parts.push(r.deleted + ' файлов удалено');
      if (r.ram_freed_mb > 0) parts.push('RAM +' + r.ram_freed_mb + ' МБ');
      else if (r.ram_available_mb > 0) parts.push('RAM свободно: ' + Math.round(r.ram_available_mb / 1024 * 10) / 10 + ' ГБ');
      res.textContent = parts.join(' · ') || 'Система оптимизирована';
      // Refresh stats
      try {
        const s = await pywebview.api.getStats();
        if (s) applyStats(s);
      } catch(e) {}
      setTimeout(() => {
        btn.classList.remove('done');
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Оптимизировать';
        res.textContent = '';
      }, 4000);
    } catch(e) {
      btn.classList.remove('running');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Оптимизировать';
      res.textContent = 'Ошибка оптимизации';
    }
  }

  function doShow() { pywebview.api.showMainWindow(); closePopup(); }
  function doChat() { pywebview.api.navigateTo('chat'); pywebview.api.showMainWindow(); closePopup(); }
  function doNav(p) { pywebview.api.navigateTo(p); pywebview.api.showMainWindow(); closePopup(); }
  function doQuit() { pywebview.api.quitApp(); }
  function closePopup() { pywebview.api.closePopup(); }
  function el(id) { return document.getElementById(id); }

  window.addEventListener('pywebviewready', init);
</script>
</body>
</html>
